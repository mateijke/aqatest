name: Run autotests

on:
  schedule:
    - cron: "50 11 * * *"  # каждый день в 14:50 по Минску (UTC+3)
  workflow_dispatch:
    inputs:
      deployment_target:
        description: select tests to run
        required: true
        type: choice
        default: all
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Copy source code
        uses: actions/checkout@v4

      - name: Set up Python env
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v -k "not simple_site2_test and not onliner_test and not login_test.py"
